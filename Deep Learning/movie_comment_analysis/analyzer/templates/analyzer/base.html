<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SentiScope – IMDb Sentiment Analyzer{% endblock %}</title>
  <meta name="description" content="AI-powered IMDb movie review sentiment analysis using TF-IDF + Logistic Regression." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:        #05060f;
      --clr-surface:   #0d0f1e;
      --clr-card:      #111326;
      --clr-border:    rgba(255,255,255,0.07);
      --clr-text:      #e8eaf6;
      --clr-muted:     #7986cb;
      --clr-accent:    #7c4dff;
      --clr-accent2:   #e040fb;
      --clr-pos:       #00e676;
      --clr-neg:       #ff5252;
      --clr-pos-dim:   rgba(0,230,118,0.12);
      --clr-neg-dim:   rgba(255,82,82,0.12);
      --radius-lg:     20px;
      --radius-md:     12px;
      --radius-sm:     8px;
      --transition:    0.25s cubic-bezier(.4,0,.2,1);
      --font-main:     'Inter', sans-serif;
      --font-mono:     'JetBrains Mono', monospace;
      --shadow-glow:   0 0 40px rgba(124,77,255,0.25);
      --shadow-card:   0 8px 32px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-main);
      background: var(--clr-bg);
      color: var(--clr-text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Background Orbs ─────────────────────────────────────────── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-orbs span {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      animation: float 12s ease-in-out infinite alternate;
    }
    .bg-orbs span:nth-child(1) { width:500px;height:500px;top:-150px;left:-100px;background:var(--clr-accent); }
    .bg-orbs span:nth-child(2) { width:400px;height:400px;bottom:-100px;right:-80px;background:var(--clr-accent2);animation-delay:3s; }
    .bg-orbs span:nth-child(3) { width:300px;height:300px;top:50%;left:40%;background:#00b0ff;animation-delay:6s; }
    @keyframes float {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-30px) scale(1.05); }
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .wrapper { position: relative; z-index: 1; }

    /* ── Navbar ──────────────────────────────────────────────────── */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(13,15,30,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--clr-border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.35rem; font-weight: 800; letter-spacing: -0.5px;
      text-decoration: none; color: var(--clr-text);
    }
    .nav-brand .icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--clr-accent), var(--clr-accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .nav-brand span.grad {
      background: linear-gradient(90deg, var(--clr-accent), var(--clr-accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      padding: 8px 18px; border-radius: var(--radius-sm);
      text-decoration: none; color: var(--clr-muted);
      font-size: 0.9rem; font-weight: 500;
      transition: color var(--transition), background var(--transition);
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--clr-text); background: rgba(255,255,255,0.06);
    }
    .nav-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
    }
    .nav-badge.ready  { background: rgba(0,230,118,0.12); color: var(--clr-pos); }
    .nav-badge.notready { background: rgba(255,82,82,0.12);  color: var(--clr-neg); }
    .nav-badge .dot { width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Page content ────────────────────────────────────────────── */
    .page { max-width: 900px; margin: 0 auto; padding: 56px 24px 80px; }

    /* ── Hero ────────────────────────────────────────────────────── */
    .hero { text-align: center; margin-bottom: 48px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 20px; margin-bottom: 24px;
      background: rgba(124,77,255,0.12); border: 1px solid rgba(124,77,255,0.3);
      font-size: 0.8rem; font-weight: 600; color: #b39ddb; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 900; letter-spacing: -1.5px; line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 .grad {
      background: linear-gradient(90deg, var(--clr-accent), var(--clr-accent2), #00b0ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-size: 200% auto; animation: shine 4s linear infinite;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    .hero p { color: var(--clr-muted); font-size: 1.05rem; max-width: 560px; margin: 0 auto; }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--clr-card);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: var(--shadow-card);
      transition: box-shadow var(--transition);
    }
    .card:hover { box-shadow: var(--shadow-glow); }
    .card-title {
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--clr-muted); margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::after {
      content:""; flex:1; height:1px; background: var(--clr-border);
    }

    /* ── Form ────────────────────────────────────────────────────── */
    .review-form { margin-bottom: 0; }
    .textarea-wrap { position: relative; margin-bottom: 20px; }
    .review-textarea {
      width: 100%; min-height: 160px;
      padding: 18px 20px; resize: vertical;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-md);
      color: var(--clr-text); font-family: var(--font-main); font-size: 1rem;
      line-height: 1.7; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .review-textarea:focus {
      border-color: var(--clr-accent);
      box-shadow: 0 0 0 3px rgba(124,77,255,0.2);
    }
    .review-textarea::placeholder { color: rgba(121,134,203,0.5); }
    .char-counter {
      position: absolute; bottom: 12px; right: 16px;
      font-size: 0.75rem; color: var(--clr-muted);
      font-family: var(--font-mono); pointer-events: none;
    }
    .form-actions { display: flex; gap: 12px; align-items: center; }
    .btn-predict {
      flex: 1; padding: 16px 32px;
      background: linear-gradient(135deg, var(--clr-accent), var(--clr-accent2));
      border: none; border-radius: var(--radius-md);
      color: #fff; font-family: var(--font-main);
      font-size: 1rem; font-weight: 700; letter-spacing: 0.3px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .btn-predict:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,77,255,0.45);
    }
    .btn-predict:active { transform: translateY(0); }
    .btn-predict .ripple {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3);
      width: 0; height: 0; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: ripple-anim 0.6s ease-out;
    }
    @keyframes ripple-anim {
      to { width: 300px; height: 300px; opacity: 0; }
    }
    .btn-clear {
      padding: 16px 24px; border-radius: var(--radius-md);
      border: 1.5px solid var(--clr-border); background: transparent;
      color: var(--clr-muted); font-family: var(--font-main);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      transition: all var(--transition);
    }
    .btn-clear:hover { border-color: var(--clr-accent); color: var(--clr-text); }

    /* ── Error Banner ─────────────────────────────────────────────── */
    .error-banner {
      padding: 14px 20px; border-radius: var(--radius-sm);
      background: var(--clr-neg-dim); border: 1px solid rgba(255,82,82,0.3);
      color: var(--clr-neg); font-size: 0.9rem; margin-bottom: 20px;
    }

    /* ── Result Card ─────────────────────────────────────────────── */
    .result-card {
      margin-top: 28px; border-radius: var(--radius-lg); padding: 32px;
      animation: slide-up 0.45s cubic-bezier(.22,1,.36,1);
      border: 1.5px solid;
    }
    @keyframes slide-up {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .result-card.positive {
      background: var(--clr-pos-dim);
      border-color: rgba(0,230,118,0.25);
    }
    .result-card.negative {
      background: var(--clr-neg-dim);
      border-color: rgba(255,82,82,0.25);
    }
    .result-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .result-emoji { font-size: 3rem; line-height: 1; }
    .result-label {
      font-size: 2rem; font-weight: 900; letter-spacing: -1px;
    }
    .result-card.positive .result-label { color: var(--clr-pos); }
    .result-card.negative .result-label { color: var(--clr-neg); }
    .result-subtitle { color: var(--clr-muted); font-size: 0.85rem; margin-top: 2px; }

    /* ── Confidence bar ──────────────────────────────────────────── */
    .conf-section { margin-bottom: 24px; }
    .conf-label {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; font-weight: 600; margin-bottom: 10px;
    }
    .conf-label span:first-child { color: var(--clr-muted); text-transform: uppercase; letter-spacing: 1px; }
    .conf-label span:last-child { font-family: var(--font-mono); font-size: 1rem; color: var(--clr-text); }
    .conf-bar-track {
      height: 10px; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%; border-radius: 999px;
      transition: width 1s cubic-bezier(.22,1,.36,1);
      width: 0;
    }
    .positive .conf-bar-fill { background: linear-gradient(90deg, #00c853, var(--clr-pos)); }
    .negative .conf-bar-fill { background: linear-gradient(90deg, #c62828, var(--clr-neg)); }

    /* ── Probability pills ───────────────────────────────────────── */
    .proba-pills { display: flex; gap: 12px; flex-wrap: wrap; }
    .pill {
      flex: 1; min-width: 120px; padding: 14px 18px; border-radius: var(--radius-md);
      text-align: center;
    }
    .pill-pos { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); }
    .pill-neg { background: rgba(255,82,82,0.1);  border: 1px solid rgba(255,82,82,0.2);  }
    .pill-val { font-size: 1.5rem; font-weight: 800; font-family: var(--font-mono); }
    .pill-pos .pill-val { color: var(--clr-pos); }
    .pill-neg .pill-val { color: var(--clr-neg); }
    .pill-name { font-size: 0.75rem; color: var(--clr-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* ── Review echo ─────────────────────────────────────────────── */
    .review-echo {
      margin-top: 20px; padding: 16px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03); border: 1px solid var(--clr-border);
      font-size: 0.9rem; color: var(--clr-muted); line-height: 1.7;
      font-style: italic;
    }
    .review-echo strong { display: block; font-style: normal; color: var(--clr-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* ── Training report ─────────────────────────────────────────── */
    .report-toggle {
      margin-top: 40px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none; padding: 0; background: none; border: none;
      color: var(--clr-muted); font-family: var(--font-main); font-size: 0.85rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      transition: color var(--transition);
    }
    .report-toggle:hover { color: var(--clr-text); }
    .report-toggle .chevron { transition: transform var(--transition); }
    .report-toggle.open .chevron { transform: rotate(180deg); }
    .report-box {
      display: none; margin-top: 16px; padding: 24px;
      background: var(--clr-surface); border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
    }
    .report-box.visible { display: block; animation: slide-up 0.35s ease; }
    .report-box pre {
      font-family: var(--font-mono); font-size: 0.78rem; color: #b0bec5;
      white-space: pre-wrap; word-break: break-word; line-height: 1.8;
    }

    /* ── Sample reviews ──────────────────────────────────────────── */
    .samples { margin-top: 32px; }
    .samples-title { font-size: 0.78rem; font-weight: 600; color: var(--clr-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .sample-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid var(--clr-border); background: transparent;
      color: var(--clr-muted); font-family: var(--font-main);
      font-size: 0.82rem; cursor: pointer;
      transition: all var(--transition);
    }
    .chip:hover { border-color: var(--clr-accent); color: var(--clr-text); background: rgba(124,77,255,0.08); }

    /* ── Alert banner ────────────────────────────────────────────── */
    .alert {
      padding: 20px 24px; border-radius: var(--radius-md); margin-bottom: 28px;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .alert-warn { background: rgba(255,171,0,0.1); border: 1px solid rgba(255,171,0,0.3); }
    .alert-icon { font-size: 1.4rem; line-height: 1; }
    .alert-body { flex: 1; }
    .alert-title { font-weight: 700; font-size: 0.95rem; color: #ffab00; margin-bottom: 4px; }
    .alert-text { color: var(--clr-muted); font-size: 0.88rem; line-height: 1.6; }
    .alert-text code { font-family: var(--font-mono); font-size: 0.82rem; background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 4px; color: #f0f4c3; }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer {
      text-align: center; padding: 32px;
      border-top: 1px solid var(--clr-border);
      color: var(--clr-muted); font-size: 0.82rem;
    }
    footer strong { color: var(--clr-text); }

    /* ── About page ──────────────────────────────────────────────── */
    .about-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--clr-card); border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); padding: 24px; text-align: center;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-glow); }
    .stat-val { font-size: 2.2rem; font-weight: 900; font-family: var(--font-mono); color: var(--clr-accent); }
    .stat-name { font-size: 0.78rem; color: var(--clr-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .pipeline-steps { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .step {
      display: flex; gap: 16px; align-items: flex-start; padding: 20px 0;
      border-bottom: 1px solid var(--clr-border);
      animation: slide-up 0.5s ease both;
    }
    .step:last-child { border-bottom: none; }
    .step-num {
      min-width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--clr-accent), var(--clr-accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .step-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .step-info p { font-size: 0.85rem; color: var(--clr-muted); line-height: 1.6; }

    /* ── Loading spinner ─────────────────────────────────────────── */
    .spinner { display: none; width: 20px; height: 20px; margin-right: 8px; vertical-align: middle; }
    .spinner circle { stroke: #fff; stroke-width: 3; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; animation: spin-dash 1s ease infinite; }
    @keyframes spin-dash { to { stroke-dashoffset: 0; } }
    .btn-predict.loading .spinner { display: inline; }
    .btn-predict.loading .btn-text { opacity: 0.7; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="bg-orbs">
  <span></span><span></span><span></span>
</div>

<div class="wrapper">
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <div class="icon">🎬</div>
      <span>Senti<span class="grad">Scope</span></span>
    </a>
    <div class="nav-links">
      <a href="/" id="nav-home" class="{% block nav_home %}{% endblock %}">Analyze</a>
      <a href="/about/" id="nav-about" class="{% block nav_about %}{% endblock %}">About</a>
    </div>
    {% if model_ready %}
      <span class="nav-badge ready"><span class="dot"></span>Model Ready</span>
    {% else %}
      <span class="nav-badge notready"><span class="dot"></span>Model Not Loaded</span>
    {% endif %}
  </nav>

  {% block content %}{% endblock %}

  <footer>
    <strong>SentiScope</strong> · IMDb Sentiment Analysis · TF-IDF + Logistic Regression
  </footer>
</div>

{% block extra_scripts %}{% endblock %}
</body>
</html>
